<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Swarm Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --text-dim: #8b8fa3;
    --accent: #6c5ce7;
    --green: #00b894;
    --yellow: #fdcb6e;
    --red: #e17055;
    --blue: #74b9ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    font-size: 14px;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 18px; font-weight: 600; }
  .header-meta { color: var(--text-dim); font-size: 12px; }

  /* Workspace Switcher */
  .ws-switcher {
    position: relative;
    display: inline-block;
  }
  .ws-current {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
    transition: border-color 0.15s;
  }
  .ws-current:hover { border-color: var(--accent); }
  .ws-current .ws-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .ws-status-active { background: var(--green); }
  .ws-status-cloning { background: var(--yellow); }
  .ws-status-error { background: var(--red); }
  .ws-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    margin-top: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    min-width: 340px;
    z-index: 100;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .ws-dropdown.open { display: block; }
  .ws-dropdown-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.1s;
  }
  .ws-dropdown-item:hover { background: rgba(255,255,255,0.05); }
  .ws-dropdown-item.selected { background: rgba(108,92,231,0.15); }
  .ws-dropdown-item .ws-item-name { flex: 1; }
  .ws-dropdown-item .ws-item-repo { color: var(--text-dim); font-size: 11px; white-space: nowrap; }
  .ws-dropdown-divider { border-top: 1px solid var(--border); margin: 4px 0; }
  .ws-dropdown-action {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 12px;
    color: var(--accent);
    transition: background 0.1s;
  }
  .ws-dropdown-action:hover { background: rgba(108,92,231,0.1); }

  .ws-settings-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    padding: 4px 8px;
    border-radius: 4px;
    transition: background 0.1s, color 0.1s;
  }
  .ws-settings-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    justify-content: center;
    align-items: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    min-width: 480px;
    max-width: 640px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal h3 { font-size: 16px; margin-bottom: 16px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .modal-field input, .modal-field select {
    width: 100%;
    padding: 8px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
  }
  .modal-field input:focus, .modal-field select:focus { outline: none; border-color: var(--accent); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
  .btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    transition: all 0.15s;
  }
  .btn:hover { background: rgba(255,255,255,0.05); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-danger { background: var(--red); border-color: var(--red); color: white; }
  .btn-danger:hover { opacity: 0.9; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }

  /* Env Editor */
  .env-editor { margin-top: 12px; }
  .env-file-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .env-file-tab {
    padding: 4px 10px;
    font-size: 11px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    color: var(--text-dim);
  }
  .env-file-tab.active { border-color: var(--accent); color: var(--accent); }
  .env-tab-del { margin-left:6px; opacity:0.4; font-size:13px; font-weight:bold; }
  .env-tab-del:hover { opacity:1; color:#e55; }
  .env-row {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
    align-items: center;
  }
  .env-row input {
    padding: 6px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
  }
  .env-row input:focus { outline: none; border-color: var(--accent); }
  .env-row .env-key { width: 180px; }
  .env-row .env-val { flex: 1; }
  .env-row .env-del {
    background: none; border: none; color: var(--red); cursor: pointer; font-size: 14px; padding: 4px;
  }

  /* Repo structure */
  .structure-section { margin-top: 12px; }
  .structure-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .structure-badge.monorepo { background: rgba(108,92,231,0.2); color: var(--accent); }
  .structure-badge.standard { background: rgba(0,184,148,0.2); color: var(--green); }
  .pkg-list { margin-top: 6px; font-size: 12px; color: var(--text-dim); }
  .pkg-item { padding: 2px 0; }
  .env-file-found { font-size: 11px; color: var(--yellow); margin-top: 4px; }

  /* Existing styles */
  .metrics-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    text-align: center;
  }
  .metric-card .value { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .metric-card .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .metric-green .value { color: var(--green); }
  .metric-yellow .value { color: var(--yellow); }
  .metric-red .value { color: var(--red); }
  .metric-blue .value { color: var(--blue); }
  .metric-accent .value { color: var(--accent); }

  section { margin-bottom: 24px; }
  section h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .agent-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 10px;
  }
  .agent-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .agent-name { font-weight: 600; }
  .status-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .status-running { background: rgba(108, 92, 231, 0.2); color: var(--accent); }
  .status-completed { background: rgba(0, 184, 148, 0.2); color: var(--green); }
  .status-failed { background: rgba(225, 112, 85, 0.2); color: var(--red); }
  .status-timeout { background: rgba(253, 203, 110, 0.2); color: var(--yellow); }
  .status-pending { background: rgba(139, 143, 163, 0.2); color: var(--text-dim); }
  .status-pr_created { background: rgba(116, 185, 255, 0.2); color: var(--blue); }
  .status-in_progress { background: rgba(108, 92, 231, 0.2); color: var(--accent); }
  .status-resolved { background: rgba(0, 184, 148, 0.2); color: var(--green); }
  .status-needs_human { background: rgba(225, 112, 85, 0.2); color: var(--red); }
  .status-rate_limited { background: rgba(253, 203, 110, 0.3); color: var(--yellow); }
  .status-resumed { background: rgba(116, 185, 255, 0.2); color: var(--blue); }
  .status-active { background: rgba(0, 184, 148, 0.2); color: var(--green); }
  .status-cloning { background: rgba(253, 203, 110, 0.2); color: var(--yellow); }
  .status-error { background: rgba(225, 112, 85, 0.2); color: var(--red); }

  .agent-details { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
  .agent-details span { margin-right: 16px; }

  .log-stream {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px;
    max-height: 500px;
    overflow-y: auto;
    font-size: 11px;
    line-height: 1.6;
  }
  .log-stream .log-line { color: var(--text-dim); word-break: break-word; padding: 2px 0; }
  .log-stream .log-line .log-time { color: var(--text-dim); opacity: 0.6; margin-right: 8px; }
  .log-stream .log-line .log-type { margin-right: 8px; font-weight: 600; }
  .log-stream .log-line .log-type.t-assistant { color: var(--accent); }
  .log-stream .log-line .log-type.t-tool_use { color: var(--yellow); }
  .log-stream .log-line .log-type.t-tool_result { color: var(--text-dim); }
  .log-stream .log-line .log-type.t-result { color: var(--green); }
  .log-stream .log-line .log-type.t-error { color: var(--red); }
  .log-stream .log-line .log-type.t-system { color: var(--blue); }
  .log-stream .log-line .thinking { color: var(--text-dim); font-style: italic; }
  .log-stream .log-line .log-type.t-user { color: var(--text-dim); }
  .log-stream .log-line .log-type.t-rate_limit_event { color: var(--yellow); }

  .issue-table, .pr-table { width: 100%; border-collapse: collapse; }
  .issue-table th, .pr-table th {
    text-align: left;
    font-size: 11px;
    color: var(--text-dim);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .issue-table td, .pr-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .empty-state {
    text-align: center;
    padding: 24px;
    color: var(--text-dim);
    font-style: italic;
  }
  .pr-threads-row td { padding: 0 12px 12px 12px; border-bottom: 1px solid var(--border); }
  .pr-threads { display: flex; flex-direction: column; gap: 6px; }
  .pr-thread {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px;
    font-size: 12px;
  }
  .pr-thread-file { font-size: 11px; color: var(--blue); margin-bottom: 4px; }
  .pr-thread-comment { color: var(--text-dim); line-height: 1.5; margin-top: 2px; }
  .pr-thread-comment .thread-author { color: var(--text); font-weight: 600; margin-right: 6px; }
  .log-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 8px;
    margin-top: 4px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 11px;
    user-select: none;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .log-toggle:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .log-toggle .chevron { display: inline-block; transition: transform 0.2s; font-size: 9px; }
  .log-toggle .chevron.open { transform: rotate(90deg); }
  .pr-toggle { cursor: pointer; color: var(--accent); font-size: 11px; user-select: none; }
  .pr-toggle:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Claude Code Swarm</h1>
    <div class="ws-switcher">
      <div class="ws-current" onclick="toggleWsDropdown()">
        <span class="ws-status ws-status-active" id="ws-indicator"></span>
        <span id="ws-current-name">All Workspaces</span>
        <span style="font-size:9px">&#9660;</span>
      </div>
      <div class="ws-dropdown" id="ws-dropdown"></div>
    </div>
    <button class="ws-settings-btn" id="ws-settings-toggle" onclick="openWorkspaceSettings()" title="Workspace Settings" style="display:none">&#9881;</button>
  </div>
  <div class="header-meta">
    <span id="agent-count">&mdash;</span> |
    <span id="last-updated">&mdash;</span>
  </div>
</header>

<div class="metrics-bar">
  <div class="metric-card metric-green"><div class="value" id="m-resolved">&mdash;</div><div class="label">Resolved</div></div>
  <div class="metric-card metric-yellow"><div class="value" id="m-pending">&mdash;</div><div class="label">In Queue</div></div>
  <div class="metric-card metric-accent"><div class="value" id="m-in-progress">&mdash;</div><div class="label">In Progress</div></div>
  <div class="metric-card metric-blue"><div class="value" id="m-pr-created">&mdash;</div><div class="label">PRs Open</div></div>
  <div class="metric-card metric-red"><div class="value" id="m-needs-human">&mdash;</div><div class="label">Needs Human</div></div>
  <div class="metric-card metric-yellow"><div class="value" id="m-rate-limited">&mdash;</div><div class="label">Rate Limited</div></div>
  <div class="metric-card"><div class="value" id="m-avg-turns">&mdash;</div><div class="label">Avg Turns</div></div>
</div>

<section>
  <h2>Active Agents</h2>
  <div id="agents-list"><div class="empty-state">No agents running</div></div>
</section>

<section>
  <h2>Issue Queue</h2>
  <div id="issues-list"><div class="empty-state">No issues tracked</div></div>
</section>

<section>
  <h2>PR Tracker</h2>
  <div id="prs-list"><div class="empty-state">No PRs tracked</div></div>
</section>

<!-- Add Workspace Modal -->
<div class="modal-overlay" id="modal-add-ws">
  <div class="modal">
    <h3>Add Workspace</h3>
    <div class="modal-field">
      <label>Repository URL</label>
      <input type="text" id="add-ws-url" placeholder="https://github.com/owner/repo or owner/repo">
    </div>
    <div class="modal-field">
      <label>Workspace Name (optional)</label>
      <input type="text" id="add-ws-name" placeholder="Auto-detected from URL">
    </div>
    <div class="modal-field">
      <label>Base Branch</label>
      <input type="text" id="add-ws-branch" value="main">
    </div>
    <div id="add-ws-error" style="color:var(--red);font-size:12px;margin-top:4px;display:none"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-add-ws')">Cancel</button>
      <button class="btn btn-primary" onclick="addWorkspace()">Add & Clone</button>
    </div>
  </div>
</div>

<!-- Workspace Settings Modal -->
<div class="modal-overlay" id="modal-ws-settings">
  <div class="modal" style="min-width:560px">
    <h3 id="ws-settings-title">Workspace Settings</h3>
    <div id="ws-settings-body"></div>
    <div class="modal-actions">
      <button class="btn btn-danger btn-sm" onclick="deleteCurrentWorkspace()" id="ws-delete-btn">Delete Workspace</button>
      <span style="flex:1"></span>
      <button class="btn" onclick="closeModal('modal-ws-settings')">Close</button>
      <button class="btn btn-primary" onclick="saveWorkspaceSettings()">Save Changes</button>
    </div>
  </div>
</div>

<script>
const API = '';
const POLL_MS = 3000;

// Workspace state
let workspaces = [];
let currentWorkspaceId = null; // null = all workspaces
let wsDropdownOpen = false;

// Current settings workspace data (for settings modal)
let settingsWs = null;
let settingsEnvFile = '.env';
let settingsEnvVars = {};
let settingsAllEnvVars = {};  // { "envFilePath": { KEY: VAL, ... }, ... } — tracks all tabs

function wsFilter() {
  return currentWorkspaceId ? `workspace_id=${currentWorkspaceId}` : '';
}

function toggleWsDropdown() {
  wsDropdownOpen = !wsDropdownOpen;
  renderWsDropdown();
}

function renderWsDropdown() {
  const dd = document.getElementById('ws-dropdown');
  if (!wsDropdownOpen) { dd.classList.remove('open'); return; }
  dd.classList.add('open');

  let html = `<div class="ws-dropdown-item ${!currentWorkspaceId ? 'selected' : ''}" onclick="selectWorkspace(null)">
    <span class="ws-status ws-status-active"></span>
    <span class="ws-item-name">All Workspaces</span>
  </div>`;
  for (const ws of workspaces) {
    html += `<div class="ws-dropdown-item ${currentWorkspaceId === ws.id ? 'selected' : ''}" onclick="selectWorkspace('${ws.id}')">
      <span class="ws-status ws-status-${ws.status}"></span>
      <span class="ws-item-name">${esc(ws.name)}</span>
      <span class="ws-item-repo">${esc(ws.github_repo)}</span>
    </div>`;
  }
  html += `<div class="ws-dropdown-divider"></div>`;
  html += `<div class="ws-dropdown-action" onclick="openAddWorkspace()">+ Add Workspace</div>`;
  dd.innerHTML = html;
}

function selectWorkspace(id) {
  currentWorkspaceId = id;
  wsDropdownOpen = false;
  document.getElementById('ws-dropdown').classList.remove('open');

  const ws = workspaces.find(w => w.id === id);
  const nameEl = document.getElementById('ws-current-name');
  const indEl = document.getElementById('ws-indicator');
  const settingsBtn = document.getElementById('ws-settings-toggle');

  if (ws) {
    nameEl.textContent = ws.name;
    indEl.className = 'ws-status ws-status-' + ws.status;
    settingsBtn.style.display = '';
  } else {
    nameEl.textContent = 'All Workspaces';
    indEl.className = 'ws-status ws-status-active';
    settingsBtn.style.display = 'none';
  }
  poll();
}

function openAddWorkspace() {
  wsDropdownOpen = false;
  document.getElementById('ws-dropdown').classList.remove('open');
  document.getElementById('add-ws-url').value = '';
  document.getElementById('add-ws-name').value = '';
  document.getElementById('add-ws-branch').value = 'main';
  document.getElementById('add-ws-error').style.display = 'none';
  document.getElementById('modal-add-ws').classList.add('open');
}

async function addWorkspace() {
  const url = document.getElementById('add-ws-url').value.trim();
  if (!url) { showAddWsError('Please enter a repository URL'); return; }
  const name = document.getElementById('add-ws-name').value.trim() || null;
  const branch = document.getElementById('add-ws-branch').value.trim() || 'main';

  try {
    const r = await fetch(API + '/api/workspaces', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({repo_url: url, name, base_branch: branch}),
    });
    const data = await r.json();
    if (data.error) { showAddWsError(data.error); return; }
    closeModal('modal-add-ws');
    await updateWorkspaces();
    selectWorkspace(data.workspace.id);
  } catch(e) { showAddWsError('Failed to create workspace: ' + e.message); }
}

function showAddWsError(msg) {
  const el = document.getElementById('add-ws-error');
  el.textContent = msg;
  el.style.display = 'block';
}

async function openWorkspaceSettings() {
  if (!currentWorkspaceId) return;
  const ws = workspaces.find(w => w.id === currentWorkspaceId);
  if (!ws) return;
  settingsWs = ws;

  // Fetch structure and env files
  const [structRes, envFilesRes] = await Promise.all([
    fetchJSON(API + `/api/workspaces/${ws.id}/structure`),
    fetchJSON(API + `/api/workspaces/${ws.id}/env-files`),
  ]);

  const structure = structRes?.structure || {};
  const envFiles = envFilesRes || { managed: [], discovered: [] };

  document.getElementById('ws-settings-title').textContent = `Settings: ${ws.name}`;
  settingsEnvFile = '.env';
  settingsAllEnvVars = {};

  let html = `
    <div class="modal-field"><label>Workspace Name</label><input type="text" id="ws-edit-name" value="${esc(ws.name)}"></div>
    <div class="modal-field"><label>Repository URL</label><input type="text" id="ws-edit-url" value="${esc(ws.repo_url)}"></div>
    <div class="modal-field"><label>Base Branch</label><input type="text" id="ws-edit-branch" value="${esc(ws.base_branch)}"></div>
    <div class="modal-field"><label>Local Path</label><div style="padding:6px 0;font-size:12px;color:var(--text-dim);font-family:monospace">${esc(ws.local_path || 'Unknown')}</div></div>
    <div class="modal-field"><label>Status</label> ${statusBadge(ws.status)}</div>

    <div class="structure-section">
      <label style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px">Repo Structure</label>
      <div style="margin-top:4px">
        <span class="structure-badge ${structure.is_monorepo ? 'monorepo' : 'standard'}">${structure.is_monorepo ? 'Monorepo' : 'Standard Repo'}</span>
      </div>
      ${structure.packages?.length ? `<div class="pkg-list">${structure.packages.map(p => `<div class="pkg-item">&bull; ${esc(p.path)} <span style="color:var(--text-dim)">(${esc(p.name)})</span></div>`).join('')}</div>` : ''}
      ${structure.env_files?.length ? `<div class="env-file-found">Found env files: ${structure.env_files.map(f => esc(f.path)).join(', ')}</div>` : ''}
    </div>

    <div class="env-editor">
      <label style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px">Environment Variables</label>
      <div class="env-file-tabs" id="env-file-tabs"></div>
      <div id="env-rows"></div>
      <div style="margin-top:8px;display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;gap:6px;align-items:center">
          <button class="btn btn-sm" onclick="addEnvRow()">+ Add Variable</button>
          <label class="btn btn-sm" style="cursor:pointer;margin:0">
            Upload .env file
            <input type="file" id="env-file-upload" style="display:none" onchange="handleEnvFileUpload(this)">
          </label>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <input type="text" id="env-new-file" placeholder="Target path (e.g. marketplace/.env)" style="flex:1;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:inherit;font-size:11px">
          <button class="btn btn-sm" onclick="addEnvFileTab()">Add File</button>
        </div>
        <div style="font-size:10px;color:var(--text-dim);margin-top:2px">Tip: To upload env vars to a specific path, first add the file tab above, then upload.</div>
      </div>
    </div>
  `;
  document.getElementById('ws-settings-body').innerHTML = html;

  // Build env file tabs
  const allFiles = new Set(['.env']);
  (envFiles.managed || []).forEach(f => allFiles.add(f));
  (envFiles.discovered || []).forEach(f => allFiles.add(f.path));
  renderEnvFileTabs([...allFiles]);

  document.getElementById('modal-ws-settings').classList.add('open');
}

function renderEnvFileTabs(files) {
  const el = document.getElementById('env-file-tabs');
  el.innerHTML = files.map(f =>
    `<div class="env-file-tab ${f === settingsEnvFile ? 'active' : ''}" data-file="${esc(f)}" onclick="switchEnvFile('${esc(f)}')">${esc(f)}<span class="env-tab-del" onclick="event.stopPropagation();deleteEnvFileTab('${esc(f)}')" title="Delete this env file">&times;</span></div>`
  ).join('');
  loadEnvVars(settingsEnvFile);
}

function _collectCurrentEnvRows() {
  // Collect env vars from the DOM rows into settingsEnvVars
  const rows = document.querySelectorAll('#env-rows .env-row');
  const vars = {};
  rows.forEach(row => {
    const key = row.querySelector('.env-key').value.trim();
    const val = row.querySelector('.env-val').value;
    if (key) vars[key] = val;
  });
  return vars;
}

async function switchEnvFile(file) {
  // Save current tab's DOM state before switching
  settingsEnvVars = _collectCurrentEnvRows();
  settingsAllEnvVars[settingsEnvFile] = settingsEnvVars;

  settingsEnvFile = file;
  document.querySelectorAll('.env-file-tab').forEach(t => t.classList.toggle('active', t.dataset.file === file));
  await loadEnvVars(file);
}

async function loadEnvVars(file) {
  if (!settingsWs) return;
  // Use cached vars if we already have them (user edited or uploaded)
  if (settingsAllEnvVars[file] !== undefined) {
    settingsEnvVars = settingsAllEnvVars[file];
    renderEnvRows();
    return;
  }
  const data = await fetchJSON(API + `/api/workspaces/${settingsWs.id}/env?env_file=${encodeURIComponent(file)}`);
  settingsEnvVars = data?.vars || {};
  settingsAllEnvVars[file] = settingsEnvVars;
  renderEnvRows();
}

function renderEnvRows() {
  const el = document.getElementById('env-rows');
  const entries = Object.entries(settingsEnvVars);
  if (entries.length === 0) {
    el.innerHTML = '<div style="font-size:12px;color:var(--text-dim);padding:8px 0">No variables set for this file</div>';
    return;
  }
  el.innerHTML = entries.map(([k, v]) => `
    <div class="env-row">
      <input class="env-key" value="${esc(k)}" data-orig="${esc(k)}" placeholder="KEY">
      <input class="env-val" value="${esc(v)}" placeholder="value">
      <button class="env-del" onclick="removeEnvRow(this, '${esc(k)}')">&times;</button>
    </div>
  `).join('');
}

function addEnvRow() {
  const el = document.getElementById('env-rows');
  const noVarsMsg = el.querySelector('div[style]');
  if (noVarsMsg && noVarsMsg.textContent.includes('No variables')) noVarsMsg.remove();
  const row = document.createElement('div');
  row.className = 'env-row';
  row.innerHTML = `
    <input class="env-key" value="" placeholder="KEY">
    <input class="env-val" value="" placeholder="value">
    <button class="env-del" onclick="this.parentElement.remove()">&times;</button>
  `;
  el.appendChild(row);
}

function removeEnvRow(btn, key) {
  btn.parentElement.remove();
  delete settingsEnvVars[key];
}

async function deleteEnvFileTab(file) {
  if (!settingsWs) return;
  if (!confirm(`Delete "${file}" and all its variables? This also removes the file from disk.`)) return;

  // Delete from backend + disk
  await fetch(API + `/api/workspaces/${settingsWs.id}/env?env_file=${encodeURIComponent(file)}`, {method: 'DELETE'});

  // Remove from local state
  delete settingsAllEnvVars[file];

  // Remove the tab from DOM
  const tabs = document.getElementById('env-file-tabs');
  [...tabs.children].forEach(t => { if (t.dataset.file === file) t.remove(); });

  // If we deleted the active tab, pick the first remaining tab or show empty
  if (settingsEnvFile === file) {
    const remaining = [...tabs.children];
    if (remaining.length > 0) {
      const nextFile = remaining[0].dataset.file;
      settingsEnvFile = nextFile;
      settingsEnvVars = settingsAllEnvVars[nextFile] || {};
    } else {
      settingsEnvFile = '.env';
      settingsEnvVars = {};
    }
  }

  document.querySelectorAll('.env-file-tab').forEach(t => t.classList.toggle('active', t.dataset.file === settingsEnvFile));
  renderEnvRows();
}

function addEnvFileTab() {
  const input = document.getElementById('env-new-file');
  const file = input.value.trim();
  if (!file) return;
  input.value = '';

  // Save current tab's state before switching
  settingsEnvVars = _collectCurrentEnvRows();
  settingsAllEnvVars[settingsEnvFile] = settingsEnvVars;

  // Switch to new file tab
  settingsEnvFile = file;
  if (!settingsAllEnvVars[file]) {
    settingsAllEnvVars[file] = {};
  }
  settingsEnvVars = settingsAllEnvVars[file];

  const tabs = document.getElementById('env-file-tabs');
  const existing = [...tabs.children].find(t => t.dataset.file === file);
  if (!existing) {
    const tab = document.createElement('div');
    tab.className = 'env-file-tab active';
    tab.dataset.file = file;
    tab.innerHTML = `${esc(file)}<span class="env-tab-del" onclick="event.stopPropagation();deleteEnvFileTab('${esc(file)}')" title="Delete this env file">&times;</span>`;
    tab.onclick = () => switchEnvFile(file);
    tabs.appendChild(tab);
  }
  document.querySelectorAll('.env-file-tab').forEach(t => t.classList.toggle('active', t.dataset.file === file));
  renderEnvRows();
}

function handleEnvFileUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    const parsed = parseEnvFileContent(text);

    // Always upload into the currently active tab
    settingsEnvVars = {..._collectCurrentEnvRows(), ...parsed};
    settingsAllEnvVars[settingsEnvFile] = settingsEnvVars;

    renderEnvRows();
    input.value = '';
  };
  reader.readAsText(file);
}

function parseEnvFileContent(text) {
  const vars = {};
  for (const line of text.split('\n')) {
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith('#')) continue;
    const eqIdx = trimmed.indexOf('=');
    if (eqIdx === -1) continue;
    const key = trimmed.slice(0, eqIdx).trim();
    let val = trimmed.slice(eqIdx + 1).trim();
    // Strip surrounding quotes
    if ((val.startsWith('"') && val.endsWith('"')) || (val.startsWith("'") && val.endsWith("'"))) {
      val = val.slice(1, -1);
    }
    if (key) vars[key] = val;
  }
  return vars;
}

async function saveWorkspaceSettings() {
  if (!settingsWs) return;

  // Save workspace details
  const name = document.getElementById('ws-edit-name').value.trim();
  const url = document.getElementById('ws-edit-url').value.trim();
  const branch = document.getElementById('ws-edit-branch').value.trim();

  const updates = {};
  if (name && name !== settingsWs.name) updates.name = name;
  if (url && url !== settingsWs.repo_url) updates.repo_url = url;
  if (branch && branch !== settingsWs.base_branch) updates.base_branch = branch;

  if (Object.keys(updates).length > 0) {
    await fetch(API + `/api/workspaces/${settingsWs.id}`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(updates),
    });
  }

  // Collect current tab's DOM state into the store
  settingsAllEnvVars[settingsEnvFile] = _collectCurrentEnvRows();

  // Save ALL env file tabs that have vars
  for (const [envFile, vars] of Object.entries(settingsAllEnvVars)) {
    if (Object.keys(vars).length > 0) {
      await fetch(API + `/api/workspaces/${settingsWs.id}/env`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({vars, env_file: envFile}),
      });
    }
  }

  closeModal('modal-ws-settings');
  await updateWorkspaces();
}

function statusBadge(status) {
  return `<span class="status-badge status-${status}">${status.replace('_', ' ')}</span>`;
}

function timeAgo(ts) {
  if (!ts) return '&mdash;';
  const d = new Date(ts + 'Z');
  const diff = Math.floor((Date.now() - d.getTime()) / 1000);
  if (diff < 60) return diff + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  return Math.floor(diff / 3600) + 'h ago';
}

function formatLogTime(ts) {
  if (!ts) return '';
  const d = new Date(ts + 'Z');
  return d.toLocaleTimeString('en-US', { hour12: false });
}

async function fetchJSON(url) {
  try {
    const r = await fetch(url);
    return await r.json();
  } catch(e) { return null; }
}

function esc(s) {

  div.textContent = s;

let currentAgentIds = [];
const agentLogState = {};
const expandedAgentLogs = new Set();

function isAgentFinished(status) {
  return !['running', 'rate_limited'].includes(status);
}

function toggleAgentLogs(agentId) {
  const logsEl = document.getElementById(`logs-${agentId}`);
  const toggleEl = document.getElementById(`log-toggle-${agentId}`);
  if (!logsEl) return;
  if (expandedAgentLogs.has(agentId)) {
    expandedAgentLogs.delete(agentId);
    logsEl.setAttribute('hidden', '');
    if (toggleEl) {
      toggleEl.querySelector('.chevron').classList.remove('open');
      toggleEl.querySelector('.toggle-label').textContent = 'Show Logs';
    }
  } else {
    expandedAgentLogs.add(agentId);
    logsEl.removeAttribute('hidden');
    if (toggleEl) {
      toggleEl.querySelector('.chevron').classList.add('open');
      toggleEl.querySelector('.toggle-label').textContent = 'Hide Logs';
    }
  }
}

async function updateAgents() {
  const qp = wsFilter();
  const data = await fetchJSON(API + '/api/agents' + (qp ? '?' + qp : ''));
  if (!data) return;
  const el = document.getElementById('agents-list');
  const agents = data.agents || [];
  if (agents.length === 0) {
    el.innerHTML = '<div class="empty-state">No agents tracked yet</div>';
    currentAgentIds = [];
    return;
  }
  const running = agents.filter(a => a.status === 'running');
  const rateLimited = agents.filter(a => a.status === 'rate_limited');
  const recent = agents.filter(a => !['running', 'rate_limited'].includes(a.status)).slice(0, 5);
  const display = [...running, ...rateLimited, ...recent];
  const newIds = display.map(a => a.agent_id);

  const listChanged = newIds.length !== currentAgentIds.length || newIds.some((id, i) => id !== currentAgentIds[i]);

  if (listChanged) {
    for (const id of currentAgentIds) delete agentLogState[id];
    currentAgentIds = newIds;

    el.innerHTML = display.map(a => {
      const finished = isAgentFinished(a.status);
      const logsVisible = !finished || expandedAgentLogs.has(a.agent_id);
      const wsName = workspaces.find(w => w.id === a.workspace_id)?.name || '';
      return `
      <div class="agent-card" id="card-${a.agent_id}">
        <div class="agent-header">
          <span class="agent-name">${a.agent_id}</span>
          ${statusBadge(a.status)}
        </div>
        <div class="agent-details">
          <span>Issue: #${a.issue_number}</span>
          ${a.pr_number ? `<span>PR: #${a.pr_number}</span>` : ''}
          <span>Type: ${a.agent_type}</span>
          <span>Turns: ${a.turns_used || 0}</span>
          <span>Branch: ${a.branch_name || '&mdash;'}</span>
          ${wsName ? `<span>Workspace: ${esc(wsName)}</span>` : ''}
          <span>Started: ${timeAgo(a.started_at)}</span>
        </div>
        ${finished ? `<div class="log-toggle" id="log-toggle-${a.agent_id}" onclick="toggleAgentLogs('${a.agent_id}')"><span class="chevron ${logsVisible ? 'open' : ''}">&#9654;</span><span class="toggle-label">${logsVisible ? 'Hide' : 'Show'} Logs</span></div>` : ''}
        <div class="log-stream" id="logs-${a.agent_id}"${!logsVisible ? ' hidden' : ''}></div>
      </div>`;
    }).join('');
  } else {
    for (const a of display) {
      const card = document.getElementById(`card-${a.agent_id}`);
      if (!card) continue;
      const header = card.querySelector('.agent-header');
      if (header) header.innerHTML = `<span class="agent-name">${a.agent_id}</span>${statusBadge(a.status)}`;
      const details = card.querySelector('.agent-details');
      const wsName = workspaces.find(w => w.id === a.workspace_id)?.name || '';
      if (details) {
        details.innerHTML = `
          <span>Issue: #${a.issue_number}</span>
          ${a.pr_number ? `<span>PR: #${a.pr_number}</span>` : ''}
          <span>Type: ${a.agent_type}</span>
          <span>Turns: ${a.turns_used || 0}</span>
          <span>Branch: ${a.branch_name || '&mdash;'}</span>
          ${wsName ? `<span>Workspace: ${esc(wsName)}</span>` : ''}
          <span>Started: ${timeAgo(a.started_at)}</span>`;
      }
      const finished = isAgentFinished(a.status);
      const existingToggle = document.getElementById(`log-toggle-${a.agent_id}`);
      const logsEl = document.getElementById(`logs-${a.agent_id}`);
      if (finished && !existingToggle) {
        const logsVisible = expandedAgentLogs.has(a.agent_id);
        const toggleDiv = document.createElement('div');
        toggleDiv.className = 'log-toggle';
        toggleDiv.id = `log-toggle-${a.agent_id}`;
        toggleDiv.onclick = () => toggleAgentLogs(a.agent_id);
        toggleDiv.innerHTML = `<span class="chevron ${logsVisible ? 'open' : ''}">&#9654;</span><span class="toggle-label">${logsVisible ? 'Hide' : 'Show'} Logs</span>`;
        if (logsEl) { card.insertBefore(toggleDiv, logsEl); if (!logsVisible) logsEl.setAttribute('hidden', ''); }
      } else if (!finished && existingToggle) {
        existingToggle.remove();
        if (logsEl) logsEl.removeAttribute('hidden');
      }
    }
  }
  for (const a of display) fetchAgentLogs(a.agent_id);
}

async function fetchAgentLogs(agentId) {
  const el = document.getElementById(`logs-${agentId}`);
  if (!el) return;
  if (!agentLogState[agentId]) agentLogState[agentId] = { lastId: 0 };
  const state = agentLogState[agentId];
  const data = await fetchJSON(API + `/api/agents/${agentId}/logs?since=${state.lastId}`);
  if (!data) return;
  const events = data.events || [];
  if (events.length === 0) {
    if (el.children.length === 0) el.innerHTML = '<div class="log-line log-placeholder" style="opacity:0.5">Waiting for events...</div>';
    return;
  }
  const placeholder = el.querySelector('.log-placeholder');
  if (placeholder) placeholder.remove();
  const wasNearBottom = (el.scrollHeight - el.scrollTop - el.clientHeight) < 50;
  for (const e of events) {
    state.lastId = Math.max(state.lastId, e.id);
    const summary = tryParseEventData(e.event_data, e.event_type);
    if (!summary) continue;
    const line = document.createElement('div');
    line.className = 'log-line';
    line.innerHTML = `<span class="log-time">${formatLogTime(e.timestamp)}</span><span class="log-type t-${e.event_type}">${e.event_type}</span>${esc(summary)}`;
    el.appendChild(line);
  }
  if (wasNearBottom) el.scrollTop = el.scrollHeight;
}

function formatToolUse(b) {
  const tool = b.name || 'unknown';
  const input = b.input || {};
  if (tool === 'Bash') return `$ ${(input.command || '').substring(0, 120)}`;
  if (tool === 'Read') return `Read ${input.file_path || '?'}`;
  if (tool === 'Edit' || tool === 'Write') return `${tool} ${input.file_path || '?'}`;
  if (tool === 'Grep') return `Grep "${input.pattern || ''}"`;
  if (tool === 'Glob') return `Glob ${input.pattern || ''}`;
  if (tool === 'Skill') return `Skill: ${input.skill || '?'}`;
  return `${tool}`;
}

function tryParseEventData(raw, eventType) {
  try {
    const d = JSON.parse(raw);
    if (eventType === 'assistant' || d.type === 'assistant') {
      const blocks = d.message?.content || [];
      const parts = [];
      for (const b of blocks) {
        if (b.type === 'text' && b.text) parts.push(b.text);
        else if (b.type === 'tool_use') parts.push(formatToolUse(b));
        else if (b.type === 'thinking' && b.thinking) parts.push('(thinking) ' + b.thinking);
        else if (typeof b === 'string') parts.push(b);
      }
      return parts.join(' ') || null;
    }
    if (eventType === 'user' || d.type === 'user') return null;
    if (eventType === 'tool_use' || d.type === 'tool_use') {
      const tool = d.tool || d.name || 'unknown';
      const input = d.input || {};
      if (tool === 'Bash') return `$ ${input.command || ''}`;
      if (tool === 'Read') return `Read ${input.file_path || '?'}`;
      if (tool === 'Edit' || tool === 'Write') return `${tool} ${input.file_path || '?'}`;
      if (tool === 'Grep') return `Grep "${input.pattern || ''}"`;
      if (tool === 'Glob') return `Glob ${input.pattern || ''}`;
      return `${tool}: ${JSON.stringify(input)}`;
    }
    if (eventType === 'tool_result' || d.type === 'tool_result') return null;
    if (eventType === 'result' || d.type === 'result') {
      const r = d.result;
      if (typeof r === 'string') return r;
      if (r && typeof r === 'object') return JSON.stringify(r);
      return 'Agent finished';
    }
    if (eventType === 'error' || d.type === 'error') {
      const err = d.error;
      if (typeof err === 'string') return err;
      if (err && err.message) return err.message;
      return 'Error occurred';
    }
    if (eventType === 'system' || d.type === 'system') {
      if (d.subtype === 'init') return `Session started in ${d.cwd || '?'}`;
      return d.message || d.text || null;
    }
    if (eventType === 'rate_limit_event') return 'Rate limit event';
    return null;
  } catch { return raw || null; }
}

async function updatePRs() {

  if (!data) return;
  const el = document.getElementById('prs-list');
  const prs = data.prs || [];
  if (prs.length === 0) {
    el.innerHTML = '<div class="empty-state">No PRs tracked yet</div>';
    return;
  }
  const rows = prs.map(p => {
    const threads = p.review_threads || [];
    const hasThreads = threads.length > 0;
    const isExpanded = expandedPRs.has(p.pr_number);
    return `<tr>
      <td>#${p.pr_number}</td>
      <td>${p.iterations}</td>
      <td>${statusBadge(p.latest_status)}</td>
      <td>${p.total_comments}${hasThreads ? ` <span class="pr-toggle" onclick="togglePRDetails(${p.pr_number})">[${isExpanded ? 'hide' : 'details'}]</span>` : ''}</td>
    </tr>${hasThreads ? `<tr class="pr-threads-row" id="pr-threads-${p.pr_number}"${isExpanded ? '' : ' hidden'}><td colspan="4">${formatReviewThreads(threads)}</td></tr>` : ''}`;
  }).join('');
  el.innerHTML = `<table class="pr-table">
    <tr><th>PR</th><th>Iterations</th><th>Status</th><th>Comments</th></tr>
    ${rows}
  </table>`;
}

async function poll() {
  await Promise.all([updateWorkspaces(), updateMetrics(), updateAgents(), updateIssues(), updatePRs()]);
}

poll();
setInterval(poll, POLL_MS);
</script>
</body>
